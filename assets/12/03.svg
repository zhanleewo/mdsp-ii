<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- 背景 -->
  <rect width="500" height="500" fill="#ffffff"/>
  
  <!-- 坐标轴 -->
  <!-- x轴 -->
  <line x1="0" y1="250" x2="480" y2="250" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- y轴 -->
  <line x1="250" y1="480" x2="250" y2="20" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- 箭头 -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <!-- 函数曲线：y = 0.08x^2 + 1 -->
  <polyline points="0,25 25,63 50,97 75,127 100,153 125,175 150,193 175,207 200,217 225,223 250,225 275,223 300,217 325,207 350,193 375,175 400,153 425,127 450,97 475,63 500,25" fill="none" stroke="#1f77b4" stroke-width="3"/>

  <!-- 切线：y = 0.48x + 0.28，经过点 (3, 1.72) -->
  <line x1="125" y1="303" x2="450" y2="147" stroke="#d62728" stroke-width="2.5" stroke-dasharray="6,4"/>

  <!-- 切点标记 -->
  <circle cx="325" cy="207" r="6" fill="#d62728"/>

  <!-- 文字标注 -->
  <text x="280" y="220" font-family="Arial" font-size="14" fill="#333">(3, 1.72)</text>
  <text x="380" y="130" font-family="Arial" font-size="16" fill="#1f77b4">y = 0.08x² + 1</text>
  <text x="380" y="300" font-family="Arial" font-size="16" fill="#d62728">切线 (斜率 = 0.48)</text>

  <!-- 坐标轴标签 -->
  <text x="485" y="275" font-family="Arial" font-size="16" fill="#333">x</text>
  <text x="270" y="20" font-family="Arial" font-size="16" fill="#333">y</text>
</svg>