<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- 箭头定义 -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black" />
    </marker>
    <marker id="arrow-y" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black" />
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="400" fill="white" />

  <!-- 坐标轴 -->
  <!-- x 轴 -->
  <line x1="20" y1="200" x2="380" y2="200" stroke="black" stroke-width="2" marker-end="url(#arrow)" />
  <!-- y 轴 -->
  <line x1="200" y1="380" x2="200" y2="20" stroke="black" stroke-width="2" marker-end="url(#arrow-y)" />

  <!-- 坐标轴标签 -->
  <text x="380" y="220" font-family="Arial" font-size="14" font-weight="bold">x</text>
  <text x="220" y="20" font-family="Arial" font-size="14" font-weight="bold">y</text>
  <text x="210" y="220" font-family="Arial" font-size="14">O</text>

  <!-- 函数图像 y = |x| -->
  <polyline points="0,0 200,200 400,0" fill="none" stroke="#1f77b4" stroke-width="4" />
  
  <!-- 函数标签 -->
  <text x="370" y="40" font-family="Arial" font-size="14" fill="#1f77b4" font-weight="bold">y = |x|</text>

  <!-- 原点标记 -->
  <circle cx="200" cy="200" r="5" fill="black" />

  <!-- 切线（次梯度） -->
  <!-- m = -1 -->
  <line x1="80" y1="140" x2="320" y2="260" stroke="#d62728" stroke-width="2" stroke-dasharray="6,4" />
  <text x="325" y="325" font-family="Arial" font-size="12" fill="#d62728">m = -1/2</text>

  <!-- m = 0 -->
  <line x1="80" y1="200" x2="320" y2="200" stroke="#2ca02c" stroke-width="2" stroke-dasharray="6,4" />
  <text x="325" y="215" font-family="Arial" font-size="12" fill="#2ca02c">m = 0</text>

  <!-- m = 1 -->
  <line x1="80" y1="260" x2="320" y2="140" stroke="#ff7f0e" stroke-width="2" stroke-dasharray="6,4" />
  <text x="325" y="85" font-family="Arial" font-size="12" fill="#ff7f0e">m = 1/2</text>

</svg>