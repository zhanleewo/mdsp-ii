<svg width="500" height="320" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="500" height="320" fill="white"/>
  
  <!-- 坐标轴 -->
  <!-- x 轴 -->
  <line x1="40" y1="260" x2="480" y2="260" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- y 轴 -->
  <line x1="60" y1="260" x2="60" y2="30" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- 轴箭头 -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black"/>
    </marker>
  </defs>
  
  <!-- 轴标签 -->
  <text x="470" y="285" font-family="Arial" font-size="14" font-weight="bold">t</text>
  <text x="50" y="25" font-family="Arial" font-size="14" font-weight="bold">f(t)</text>

  <!-- 纵轴刻度 -->
  <line x1="55" y1="260" x2="65" y2="260" stroke="black" stroke-width="1"/>
  <text x="30" y="265" font-family="Arial" font-size="12" text-anchor="middle">0</text>

  <!-- 竖直线段，间距均匀，高度参差不齐，波动很大 -->
  <!-- 线段长度（即高度）：20, 140, 60, 180, 30, 100, 160, 50, 190, 80, 120, 40 -->
  
  <!-- 第 1 条：很矮（10） -->
  <line x1="90" y1="250" x2="90" y2="260" stroke="#1f77b4" stroke-width="3"/>
  <circle cx="90" cy="250" r="4" fill="#1f77b4"/>
  
  <!-- 第 2 条：高（140） -->
  <line x1="120" y1="120" x2="120" y2="260" stroke="#1f77b4" stroke-width="3"/>
  <circle cx="120" cy="120" r="4" fill="#1f77b4"/>
  
  <!-- 第 3 条：中等（60） -->
  <line x1="150" y1="200" x2="150" y2="260" stroke="#1f77b4" stroke-width="3"/>
  <circle cx="150" cy="200" r="4" fill="#1f77b4"/>
  
  <!-- 第 4 条：很高（180） -->
  <line x1="180" y1="80" x2="180" y2="260" stroke="#1f77b4" stroke-width="3"/>
  <circle cx="180" cy="80" r="4" fill="#1f77b4"/>
  
  <!-- 第 5 条：很矮（5） -->
  <line x1="210" y1="255" x2="210" y2="260" stroke="#1f77b4" stroke-width="3"/>
  <circle cx="210" cy="255" r="4" fill="#1f77b4"/>
  
  <!-- 第 6 条：中等偏上（100） -->
  <line x1="240" y1="160" x2="240" y2="260" stroke="#1f77b4" stroke-width="3"/>
  <circle cx="240" cy="160" r="4" fill="#1f77b4"/>
  
  <!-- 第 7 条：高（160） -->
  <line x1="270" y1="100" x2="270" y2="260" stroke="#1f77b4" stroke-width="3"/>
  <circle cx="270" cy="100" r="4" fill="#1f77b4"/>
  
  <!-- 第 8 条：中等（50） -->
  <line x1="300" y1="210" x2="300" y2="260" stroke="#1f77b4" stroke-width="3"/>
  <circle cx="300" cy="210" r="4" fill="#1f77b4"/>
  
  <!-- 第 9 条：最高（190） -->
  <line x1="330" y1="70" x2="330" y2="260" stroke="#1f77b4" stroke-width="3"/>
  <circle cx="330" cy="70" r="4" fill="#1f77b4"/>
  
  <!-- 第 10 条：中等（80） -->
  <line x1="360" y1="180" x2="360" y2="260" stroke="#1f77b4" stroke-width="3"/>
  <circle cx="360" cy="180" r="4" fill="#1f77b4"/>
  
  <!-- 第 11 条：中等偏上（120） -->
  <line x1="390" y1="140" x2="390" y2="260" stroke="#1f77b4" stroke-width="3"/>
  <circle cx="390" cy="140" r="4" fill="#1f77b4"/>
  
  <!-- 第 12 条：很矮（40） -->
  <line x1="420" y1="220" x2="420" y2="260" stroke="#1f77b4" stroke-width="3"/>
  <circle cx="420" cy="220" r="4" fill="#1f77b4"/>
  
</svg>