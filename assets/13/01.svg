<svg width="500" height="320" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="500" height="320" fill="white"/>
  
  <!-- 坐标轴 -->
  <!-- x 轴 -->
  <line x1="40" y1="260" x2="480" y2="260" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- y 轴 -->
  <line x1="60" y1="260" x2="60" y2="30" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- 轴箭头 -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black"/>
    </marker>
  </defs>
  
  <!-- 轴标签 -->
  <text x="470" y="285" font-family="Arial" font-size="14" font-weight="bold">t</text>
  <text x="50" y="25" font-family="Arial" font-size="14" font-weight="bold">f(t)</text>

  <!-- 竖直线段，间距均匀，高度小幅波动 -->
  <!-- 数据点: 在 x 轴上方，高度在 50-100 之间小幅波动 -->
  
  <!-- 第 1 条 -->
  <line x1="90" y1="165" x2="90" y2="260" stroke="#1f77b4" stroke-width="3"/>
  <circle cx="90" cy="165" r="4" fill="#1f77b4"/>
  
  <!-- 第 2 条 -->
  <line x1="120" y1="180" x2="120" y2="260" stroke="#1f77b4" stroke-width="3"/>
  <circle cx="120" cy="180" r="4" fill="#1f77b4"/>
  
  <!-- 第 3 条 -->
  <line x1="150" y1="170" x2="150" y2="260" stroke="#1f77b4" stroke-width="3"/>
  <circle cx="150" cy="170" r="4" fill="#1f77b4"/>
  
  <!-- 第 4 条 -->
  <line x1="180" y1="195" x2="180" y2="260" stroke="#1f77b4" stroke-width="3"/>
  <circle cx="180" cy="195" r="4" fill="#1f77b4"/>
  
  <!-- 第 5 条 -->
  <line x1="210" y1="160" x2="210" y2="260" stroke="#1f77b4" stroke-width="3"/>
  <circle cx="210" cy="160" r="4" fill="#1f77b4"/>
  
  <!-- 第 6 条 -->
  <line x1="240" y1="175" x2="240" y2="260" stroke="#1f77b4" stroke-width="3"/>
  <circle cx="240" cy="175" r="4" fill="#1f77b4"/>
  
  <!-- 第 7 条 -->
  <line x1="270" y1="185" x2="270" y2="260" stroke="#1f77b4" stroke-width="3"/>
  <circle cx="270" cy="185" r="4" fill="#1f77b4"/>
  
  <!-- 第 8 条 -->
  <line x1="300" y1="165" x2="300" y2="260" stroke="#1f77b4" stroke-width="3"/>
  <circle cx="300" cy="165" r="4" fill="#1f77b4"/>
  
  <!-- 第 9 条 -->
  <line x1="330" y1="190" x2="330" y2="260" stroke="#1f77b4" stroke-width="3"/>
  <circle cx="330" cy="190" r="4" fill="#1f77b4"/>
  
  <!-- 第 10 条 -->
  <line x1="360" y1="170" x2="360" y2="260" stroke="#1f77b4" stroke-width="3"/>
  <circle cx="360" cy="170" r="4" fill="#1f77b4"/>
  
  <!-- 第 11 条 -->
  <line x1="390" y1="175" x2="390" y2="260" stroke="#1f77b4" stroke-width="3"/>
  <circle cx="390" cy="175" r="4" fill="#1f77b4"/>
  
  <!-- 第 12 条 -->
  <line x1="420" y1="160" x2="420" y2="260" stroke="#1f77b4" stroke-width="3"/>
  <circle cx="420" cy="160" r="4" fill="#1f77b4"/>
  
  <!-- 纵轴刻度 -->
  <line x1="55" y1="260" x2="65" y2="260" stroke="black" stroke-width="1"/>
  <text x="30" y="265" font-family="Arial" font-size="12" text-anchor="middle">0</text>
  
  <!-- 网格辅助线（可选，标出最大波动范围） -->
  <line x1="40" y1="155" x2="480" y2="155" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="20" y="160" font-family="Arial" font-size="10" fill="#999">max</text>
  
</svg>