<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" style="background: #f8f9fa; border: 1px solid #ddd;">
  <!-- 坐标轴 -->
  <line x1="80" y1="420" x2="750" y2="420" stroke="#333" stroke-width="3"/>
  <line x1="80" y1="80" x2="80" y2="420" stroke="#333" stroke-width="3"/>
  
  <polygon points="750,420 740,415 740,425" fill="#333"/>
  <polygon points="80,80 75,90 85,90" fill="#333"/>
  
  <text x="760" y="435" font-size="16" fill="#333">x</text>
  <text x="55" y="75" font-size="16" fill="#333">y</text>

  <!-- 竖桩（等距，高低不一） -->
  <line x1="140" y1="420" x2="140" y2="160" stroke="#444" stroke-width="14" stroke-linecap="round"/>
  <line x1="210" y1="420" x2="210" y2="220" stroke="#444" stroke-width="14" stroke-linecap="round"/>
  <line x1="280" y1="420" x2="280" y2="310" stroke="#444" stroke-width="14" stroke-linecap="round"/>
  <line x1="350" y1="420" x2="350" y2="110" stroke="#444" stroke-width="14" stroke-linecap="round"/>
  <line x1="420" y1="420" x2="420" y2="240" stroke="#444" stroke-width="14" stroke-linecap="round"/>
  <line x1="490" y1="420" x2="490" y2="180" stroke="#444" stroke-width="14" stroke-linecap="round"/>
  <line x1="560" y1="420" x2="560" y2="350" stroke="#444" stroke-width="14" stroke-linecap="round"/>
  <line x1="630" y1="420" x2="630" y2="150" stroke="#444" stroke-width="14" stroke-linecap="round"/>
  <line x1="700" y1="420" x2="700" y2="280" stroke="#444" stroke-width="14" stroke-linecap="round"/>

  <!-- 红色折线：严格紧贴每一根竖桩顶部（分段线性） -->
  <polyline 
    points="140,160 210,220 280,310 350,110 420,240 490,180 560,350 630,150 700,280" 
    fill="none" 
    stroke="#e74c3c" 
    stroke-width="4.5" 
    stroke-linejoin="round" 
    stroke-linecap="round"/>

  <!-- 紫色曲线：拟合所有点但较为光滑 -->
  <path d="M 140,160 
           C 170,175 190,200 210,220 
           C 245,265 260,295 280,310 
           C 310,230 325,145 350,110 
           C 375,165 395,215 420,240 
           C 455,215 470,190 490,180 
           C 520,225 535,300 560,350 
           C 590,270 610,185 630,150 
           C 660,190 675,245 700,280" 
        fill="none" stroke="#9b59b6" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 蓝色曲线：非常平滑的凸函数（整体包络） -->
  <path d="M 140,165 
           C 210,145 280,185 350,120 
           C 430,145 510,175 590,195 
           C 660,215 700,245 700,275" 
        fill="none" stroke="#3498db" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- 图例 -->
  <rect x="100" y="30" width="28" height="6" rx="1" fill="#e74c3c"/>
  <text x="140" y="37" font-size="15" fill="#e74c3c" font-weight="500">红色：紧贴每根竖桩（紧松弛）</text>
  
  <rect x="100" y="55" width="28" height="6" rx="1" fill="#9b59b6"/>
  <text x="140" y="62" font-size="15" fill="#9b59b6">紫色：较光滑拟合</text>
  
  <rect x="100" y="80" width="28" height="6" rx="1" fill="#3498db"/>
  <text x="140" y="87" font-size="15" fill="#3498db">蓝色：凸松弛（平滑凸函数）</text>

  <text x="400" y="25" font-size="22" font-weight="bold" fill="#2c3e50" text-anchor="middle">松弛（Relaxation）示意图</text>
</svg>